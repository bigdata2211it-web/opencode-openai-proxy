name: Feature request
description: Suggest an improvement or new behavior.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the proxy do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Client, model names, tier, or examples.
    validations:
      required: false
